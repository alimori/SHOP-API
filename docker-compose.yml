services:
  postgres:
    image: postgres:16
    container_name: nest-postgres

    restart: always

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7

    container_name: nest-mongo

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
